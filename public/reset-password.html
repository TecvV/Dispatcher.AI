<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispatcher.AI Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/ui.css" />
  </head>
  <body class="login-page">
    <main class="login-split">
      <section class="login-left">
        <div class="login-brand-block">
          <div class="hero-logo" aria-label="Dispatcher.AI">Dispatcher.AI</div>
          <p class="muted login-tagline">Set a new password for your account.</p>
        </div>
      </section>
      <section class="login-right">
        <section class="auth-card panel">
          <h1>Reset Password</h1>
          <p class="muted">Enter your new password below.</p>
          <div class="stack">
            <label>New Password</label>
            <input id="newPassword" type="password" placeholder="Minimum 8 characters" />
            <label class="toggle-row"><input id="showNewPassword" type="checkbox" /> <span>Show password</span></label>
            <label>Confirm Password</label>
            <input id="confirmPassword" type="password" placeholder="Re-enter new password" />
            <label class="toggle-row"><input id="showConfirmPassword" type="checkbox" /> <span>Show confirm password</span></label>
            <p class="muted">Use 8+ characters with uppercase, lowercase, number, and special character.</p>
          </div>
          <div class="row" style="margin-top: 12px">
            <button id="resetBtn">Set New Password</button>
            <a class="ghost" href="/login">Back to Login</a>
          </div>
          <section id="liveStatusBox" class="live-status">
            <p data-live-main>Validating reset link...</p>
            <p data-live-sub class="muted">Please wait.</p>
          </section>
        </section>
      </section>
    </main>
    <script type="module" src="/status-widget.js"></script>
    <script type="module" src="/reset-password.js"></script>
  </body>
</html>
